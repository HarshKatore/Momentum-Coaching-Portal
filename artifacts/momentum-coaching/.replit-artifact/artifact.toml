kind = "web"
previewPath = "/"
title = "Momentum Coaching Institute"
version = "1.0.0"
id = "artifacts/momentum-coaching"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24856
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/momentum-coaching run dev"

[services.env]
PORT = "24856"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/momentum-coaching", "run", "build"]
publicDir = "artifacts/momentum-coaching/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
